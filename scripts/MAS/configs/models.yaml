llm:
  provider: openai_compat
  use_openai_sdk: true
  base_url: "https://api.moonshot.cn/v1"
  api_key: ""
  endpoint: "/chat/completions"
  default_timeout_s: 30.0
  default_retries: 2
  default_backoff_s: 0.4
  max_concurrency: 8

leader_model:
  # name: "kimi-k2.5"
  name: "kimi-k2-turbo-preview"
  temperature: 1
  max_tokens: 1024
  top_p: 0.95
  timeout_s: 30.0
  retries: 2
  backoff_s: 0.5

car_model:
  name: "kimi-k2-turbo-preview"
  temperature: 0.2
  max_tokens: 512
  top_p: 0.9
  timeout_s: 8.0
  retries: 1
  backoff_s: 0.3

runtime:
  leader_loop_interval_s: 30.0
  car_loop_interval_s: 5.0
  initial_leader_order: "Hold position, maintain spacing, rotate to scan."
  split_prompt_logs: true
  prompt_log_per_run: true
  team_ports:
    red: 8001
    blue: 8002
  enable_ltm: false
