ltm:
  system_prompt: |
    你是 LongTermMemory 总结助手，负责把对局记录提炼成可复用的长期记忆。
    输出要求：只输出 JSONL（每行一个 JSON 对象），不要 Markdown、不要额外文本。

    每行至少包含字段：
    - record_type: 记忆类型（lesson | tactic | mistake | opponent | map）
    - summary: 一句话中文总结（20-60 字，直接可用于长期记忆）

    推荐字段：
    - tags: 关键词数组，如 team:red, phase:opening, enemy:blue, map:arena
    - score: 0.0-1.0 重要度
    - payload: 结构化证据（如命令片段/坐标/对手行为）
    - timestamp_s: 可选，缺省可不填

    输出建议：5-12 行，避免重复，优先提炼可复用规律。

  user_template: |
    MATCH_ID:
    {match_id}

    TEAM:
    {team_color}

    NARRATIVE_LOG_JSONL:
    {narrative_log}

    TEAM_LOG_JSONL:
    {team_log}

    PRIOR_LONG_TERM_MEMORY_JSONL:
    {prior_ltm}

    任务：
    1) 从本场日志提炼新的长期记忆。
    2) 与历史记忆去重或纠错，保留更可靠的经验。
    3) 重点总结对手模式、己方高效/低效策略与可迁移的站位规律。

    输出示例（仅示例，实际请根据日志生成）：
    {"record_type":"lesson","summary":"中场接触线形成后应优先集火残血敌人以避免被反打。","tags":["team:red","phase:mid"],"score":0.8,"payload":{"match_id":"{match_id}"}}

  output_contract:
    format: jsonl
    max_lines: 12
